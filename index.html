<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario de Rosas · CRISTIAN CALDERÓN</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Librerías para PDF y código de barras -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- SheetJS para exportar a XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ===== ESTILOS (igual que antes) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8f0e8;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            color: #1e2f3a;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(30, 60, 40, 0.25);
            padding: 24px 28px;
            max-height: 98vh;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #d0e0d0;
        }

        .date-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f4faf4;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #b8d0b8;
            color: #2b4b2b;
        }

        .date-box input {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e3a2e;
            outline: none;
            width: 130px;
        }

        .operator-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2c4c3c;
            color: white;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(30, 70, 50, 0.3);
        }

        .operator-box i {
            color: #f5e6b3;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #d0e0d0;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #5a7a6a;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #1e4a2e;
            background: #e0f0e0;
        }

        .tab-btn.active {
            color: #1e4a2e;
            background: #e0f0e0;
            border-bottom: 3px solid #2c8c5c;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .registro-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-card {
            background: #f9fdf9;
            border-radius: 28px;
            border: 1px solid #d4e8d4;
            padding: 20px;
            flex: 2;
            min-width: 320px;
            box-shadow: 0 8px 18px -8px rgba(30, 70, 30, 0.15);
        }

        .form-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c5c3c;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #c0dcc0;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-row label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #5f7f6f;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .form-row label i {
            width: 16px;
            color: #7f9f7f;
        }

        .form-control {
            background: white;
            border: 1px solid #c0dcc0;
            border-radius: 18px;
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2f3a;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: #4cae6c;
            box-shadow: 0 0 0 3px rgba(70, 160, 100, 0.2);
        }

        select.form-control {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%234cae6c" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
        }

        .teclado-card {
            background: #f0f8f0;
            border-radius: 28px;
            border: 1px solid #c0dcc0;
            padding: 20px;
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 20px -10px rgba(30, 70, 40, 0.2);
        }

        .calculator-display {
            background: white;
            border-radius: 20px;
            border: 1px solid #c0dcc0;
            padding: 16px 20px;
            text-align: right;
            font-size: 2.4rem;
            font-weight: 700;
            font-family: 'Inter', monospace;
            color: #1e3a2e;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            box-shadow: inset 0 2px 6px rgba(0,20,0,0.05);
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            justify-items: center;
        }

        .key-btn {
            background: white;
            border: 1px solid #b8d8b8;
            border-radius: 20px;
            width: 70px;
            height: 70px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e4a2e;
            cursor: pointer;
            box-shadow: 0 5px 0 #a0c0a0, 0 8px 14px rgba(0,20,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.08s ease;
            background: linear-gradient(145deg, #ffffff, #f5fdf5);
        }

        .key-btn:hover {
            background: #e0f5e0;
            transform: translateY(-3px);
            box-shadow: 0 7px 0 #a0c0a0, 0 12px 20px rgba(0,30,0,0.15);
        }

        .key-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #a0c0a0;
        }

        .key-btn.ir {
            background: linear-gradient(145deg, #2c8c5c, #1e6a4a);
            color: white;
            border-color: #1e4a2e;
            box-shadow: 0 5px 0 #1e4a2e, 0 8px 14px rgba(0,40,0,0.2);
        }

        .key-btn.ir:hover {
            background: #3c9c6c;
        }

        .quick-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-btn {
            background: white;
            border: 1px solid #b8d8b8;
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e4a2e;
            cursor: pointer;
            width: 60px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,20,0,0.05);
            transition: all 0.1s;
        }

        .preset-btn:hover {
            background: #e0f5e0;
            border-color: #8cb08c;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        .btn-primary, .btn-secondary, .btn-excel {
            border-radius: 50px;
            padding: 14px 0;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            flex: 1;
            transition: all 0.1s;
        }

        .btn-primary {
            background: #2c8c5c;
            border: none;
            color: white;
            box-shadow: 0 8px 16px -8px #1e4a2e;
        }

        .btn-primary:hover {
            background: #3c9c6c;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: white;
            border: 1px solid #b8d8b8;
            color: #1e4a2e;
        }

        .btn-secondary:hover {
            background: #f0faf0;
        }

        .btn-excel {
            background: #1f724c;
            border: none;
            color: white;
        }
        .btn-excel:hover {
            background: #2a8a5e;
        }

        .historial-card, .inventory-header {
            background: #f9fdf9;
            border-radius: 28px;
            border: 1px solid #d4e8d4;
            padding: 20px;
            box-shadow: 0 8px 18px -8px rgba(30,70,30,0.1);
        }

        .historial-title, .inventory-header h3 {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c5c3c;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #c0dcc0;
            padding-bottom: 10px;
        }

        .stats-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #d0e0d0;
            box-shadow: 0 4px 8px rgba(0,20,0,0.05);
        }

        .stat-icon {
            background: #2c8c5c;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .stat-info h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5f7f6f;
        }

        .stat-info p {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e3a2e;
            line-height: 1.2;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid #c0dcc0;
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
        }

        .filter-group input {
            border: none;
            padding: 10px 6px;
            font-size: 0.9rem;
            width: 120px;
            outline: none;
        }

        .search-box {
            flex: 1;
            min-width: 240px;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #c0dcc0;
            border-radius: 40px;
            padding: 4px 4px 4px 18px;
        }

        .search-box input {
            border: none;
            padding: 12px 8px;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }

        .filter-select {
            background: white;
            border: 1px solid #c0dcc0;
            border-radius: 40px;
            padding: 10px 22px;
            font-size: 0.9rem;
            outline: none;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #d4e8d4;
            background: white;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 6px 12px rgba(0,20,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1100px;
        }

        th {
            background: #e0f0e0;
            padding: 14px 8px;
            font-weight: 600;
            color: #1e4a2e;
            text-align: left;
            border-bottom: 2px solid #c0dcc0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #d0e0d0;
            color: #1e2f3a;
        }

        tbody tr:nth-child(even) {
            background-color: #f9fcf9;
        }

        tbody tr:hover {
            background-color: #e0f5e0;
        }

        .empty-row td {
            padding: 40px;
            text-align: center;
            color: #8faa8f;
            font-style: italic;
        }

        .delete-btn {
            color: #c86c6c;
            cursor: pointer;
            transition: color 0.1s;
        }

        .delete-btn:hover {
            color: #a14a4a;
        }

        .footer-info {
            margin-top: 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 18px;
            border-top: 2px solid #d0e0d0;
            font-size: 0.85rem;
            color: #5f7f6f;
        }

        .badge {
            background: #e0f0e0;
            padding: 6px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e4a2e;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: #1e2f3a;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 260px;
            max-width: 350px;
            pointer-events: auto;
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(4px);
            border-left: 5px solid;
        }

        .toast-success {
            background: #1e6a3e;
            border-left-color: #a5d6a5;
        }
        .toast-error {
            background: #b91c1c;
            border-left-color: #ffb3b3;
        }
        .toast-info {
            background: #2c5f8a;
            border-left-color: #8fc9ff;
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast .toast-message {
            flex: 1;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .toast-hide {
            animation: fadeOut 0.3s ease-out forwards;
        }

        @media (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr; }
            .registro-row { flex-direction: column; }
            .app-container { padding: 18px; }
            .key-btn { width: 60px; height: 60px; font-size: 1.4rem; }
            .toast-container { top: 10px; right: 10px; left: 10px; }
            .toast { max-width: calc(100% - 20px); }
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; }
            .stats-cards { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="date-box">
            <i class="fas fa-calendar-alt" style="color:#4f6f8f;"></i> 
            <input type="date" id="fechaRegistro" value="2026-03-11">
        </div>
        <div class="operator-box">
            <i class="fas fa-user-circle"></i> ZC ROSES
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabRegistroBtn"><i class="fas fa-pencil-alt"></i> Registro</button>
        <button class="tab-btn" id="tabHistorialBtn"><i class="fas fa-history"></i> Historial</button>
        <button class="tab-btn" id="tabMatrizBtn"><i class="fas fa-table"></i> Inventario Matriz</button>
    </div>

    <div class="tab-content active" id="tabRegistro">
        <div class="registro-row">
            <div class="form-card">
                <div class="form-title"><i class="fas fa-tag"></i> Datos de la etiqueta</div>
                <div class="form-grid">
                    <div class="form-row"><label><i class="fas fa-truck"></i> Proveedor</label><select class="form-control" id="proveedor"><option value="ZC ROSES" selected>ZC ROSES</option><option value="ROSES FARM">ROSES FARM</option><option value="FLOWER VALLEY">FLOWER VALLEY</option><option value="PETALOS SA">PETALOS SA</option></select></div>
                    <div class="form-row"><label><i class="fas fa-certificate"></i> Calidad</label><select class="form-control" id="calidad"><option value="Exportacion" selected>Exportación</option><option value="Clase b">Clase b</option><option value="nacional">nacional</option><option value="otro">otro</option></select></div>
                    <div class="form-row"><label><i class="fas fa-rose"></i> Variedad</label><select class="form-control" id="variedadSelect"><option value="BE SWEET" selected>BE SWEET</option><option value="BOULEVARD">BOULEVARD</option><option value="BRIGHTON">BRIGHTON</option><option value="BARISTA">BARISTA</option><option value="CANDLELIGHT">CANDLELIGHT</option><option value="CANDY X-PRESSION">CANDY X-PRESSION</option><option value="CARPE DIEM">CARPE DIEM</option><option value="COFFE BREAK">COFFE BREAK</option><option value="COTTON XPRESSION">COTTON XPRESSION</option><option value="COUNTRY BLUES">COUNTRY BLUES</option><option value="DEEP PURPLE">DEEP PURPLE</option><option value="ESPERANCE">ESPERANCE</option><option value="EXPLORER">EXPLORER</option><option value="FULL MONTY">FULL MONTY</option><option value="FREE SPIRIT">FREE SPIRIT</option><option value="FREEDOM">FREEDOM</option><option value="FRUTTETO">FRUTTETO</option><option value="GOTCHA">GOTCHA</option><option value="HEARTS">HEARTS</option><option value="HERMOSA">HERMOSA</option><option value="HIGH MAGIC">HIGH MAGIC</option><option value="HOT EXPLORER">HOT EXPLORER</option><option value="JACARANDA">JACARANDA</option><option value="KAHALA">KAHALA</option><option value="LOLA">LOLA</option><option value="LUCIANO">LUCIANO</option><option value="MAGIC TIMES">MAGIC TIMES</option><option value="MANDALA">MANDALA</option><option value="MANDARIN XPRESSION">MANDARIN XPRESSION</option><option value="MOONSTONE">MOONSTONE</option><option value="MOMENTUM">MOMENTUM</option><option value="MONDIAL">MONDIAL</option><option value="NINA">NINA</option><option value="NOVIA">NOVIA</option><option value="ORANGE CRUSH">ORANGE CRUSH</option><option value="PALOMA">PALOMA</option><option value="PINK FLOYD">PINK FLOYD</option><option value="PINK X-PRESSION">PINK X-PRESSION</option><option value="PLAYA BLANCA">PLAYA BLANCA</option><option value="PANDORA">PANDORA</option><option value="PINK MONDIAL">PINK MONDIAL</option><option value="PINK PUMA">PINK PUMA</option><option value="POMAROSA">POMAROSA</option><option value="POWDER PUFF">POWDER PUFF</option><option value="PRINCESS CROWN">PRINCESS CROWN</option><option value="PROUD">PROUD</option><option value="QUICKSAND">QUICKSAND</option><option value="RED PANTHER">RED PANTHER</option><option value="SHIMMER">SHIMMER</option><option value="SHOCKING BLUE">SHOCKING BLUE</option><option value="SILANTOI">SILANTOI</option><option value="SWEET BEAT">SWEET BEAT</option><option value="SWEET UNIQUE">SWEET UNIQUE</option><option value="TIBET">TIBET</option><option value="TIFFANY">TIFFANY</option><option value="VENDELA">VENDELA</option></select></div>
                    <div class="form-row"><label><i class="fas fa-box"></i> Empaque</label><select class="form-control" id="empaque"><option value="STA CLA" selected>ZC Roses</option><option value="BUNCH">BUNCH</option><option value="SLEEVE">SLEEVE</option><option value="BOX">BOX</option></select></div>
                    <div class="form-row"><label><i class="fas fa-cut"></i> Pto Corte</label><select class="form-control" id="ptoCorte"><option value="RS" selected>RS</option><option value="RC">AM</option><option value="RB">EU</option></select></div>
                    <div class="form-row"><label><i class="fas fa-ruler"></i> Longitud</label><select class="form-control" id="longitud"><option value="40">40</option><option value="50">50</option><option value="60">60</option><option value="70">70</option><option value="80">80</option><option value="90">90</option><option value="100">100</option></select></div>
                    <div class="form-row"><label><i class="fas fa-leaf"></i> Tallos</label><select class="form-control" id="tallos"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25" selected>25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option></select></div>
                </div>
            </div>

            <div class="teclado-card">
                <div class="calculator-display" id="calcDisplay">0</div>
                <div class="keypad-grid">
                    <button class="key-btn" data-num="7">7</button>
                    <button class="key-btn" data-num="8">8</button>
                    <button class="key-btn" data-num="9">9</button>
                    <button class="key-btn" data-num="4">4</button>
                    <button class="key-btn" data-num="5">5</button>

                    <button class="key-btn" data-num="2">2</button>

                <table id="historialTable">
                    <thead><tr><th>Fecha</th><th>Variedad</th><th>Long</th><th>Tallos</th><th>Empaque</th><th>Calidad</th><th>Corte</th><th>Código</th><th></th></thead>

                </table>
            </div>

    <div class="tab-content" id="tabMatriz">
        <div class="inventory-header">
            <div class="stats-cards">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-archive"></i></div><div class="stat-info"><h3>Total registros</h3><p id="totalRegistrosMatriz">0</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-rose"></i></div><div class="stat-info"><h3>Variedades</h3><p id="totalVariedadesMatriz">0</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-tag"></i></div><div class="stat-info"><h3>Total tallos</h3><p id="totalTallosMatriz">0</p></div></div>
            </div>
            <!-- Botón Limpiar inventario eliminado -->
        </div>

        <div class="filters">
            <div class="filter-group"><i class="fas fa-calendar"></i><input type="date" id="fechaDesdeMatriz" value="2026-03-06"><span>a</span><input type="date" id="fechaHastaMatriz" value="2026-03-11"></div>
            <select class="filter-select" id="filterCalidadMatriz"><option value="">Todas</option><option value="E">E</option><option value="B">B</option><option value="N">N</option><option value="O">O</option></select>
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInputMatriz" placeholder="Buscar variedad"></div>
            <button class="btn-excel" id="btnExportExcel"><i class="fas fa-file-excel"></i> Exportar a Excel</button>
        </div>

        <div class="table-container">
            <table id="matrizTable"><thead id="matrizThead"></thead><tbody id="matrizTbody"><tr class="empty-row"><td colspan="100">Cargando...</td></tr></tbody></table>
        </div>
    </div>

    <div class="footer-info">
        <div class="badge"><i class="fas fa-tag"></i> Lote: <span id="loteDisplay">RS-40-BE</span></div>
        <div class="badge"><i class="fas fa-temperature-low"></i> Cámara: 3.2°C</div>
        <div class="badge"><i class="fas fa-clock"></i> Último registro: <span id="ultimoRegistro">--:--</span></div>
        <div><i class="fas fa-check-circle" style="color:#2b6e3b;"></i> Activo</div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    (function() {
        const API_URL = 'https://inventario-rosas-backend-production.up.railway.app/api/ramos';

        const fechaInput = document.getElementById('fechaRegistro');
        const proveedorSelect = document.getElementById('proveedor');
        const calidadSelect = document.getElementById('calidad');
        const variedadSelect = document.getElementById('variedadSelect');
        const empaqueSelect = document.getElementById('empaque');
        const ptoCorteSelect = document.getElementById('ptoCorte');
        const longitudSelect = document.getElementById('longitud');
        const tallosSelect = document.getElementById('tallos');
        const loteSpan = document.getElementById('loteDisplay');
        const ultimoRegistroSpan = document.getElementById('ultimoRegistro');
        const btnRegistrar = document.getElementById('btnRegistrar');
        const btnImprimir = document.getElementById('btnImprimir');
        const irButton = document.getElementById('irButton');
        const backspaceButton = document.getElementById('backspaceButton');

        const fechaDesdeMatriz = document.getElementById('fechaDesdeMatriz');
        const fechaHastaMatriz = document.getElementById('fechaHastaMatriz');
        const filterCalidadMatriz = document.getElementById('filterCalidadMatriz');
        const searchInputMatriz = document.getElementById('searchInputMatriz');
        const matrizThead = document.getElementById('matrizThead');
        const matrizTbody = document.getElementById('matrizTbody');
        const totalRegistrosMatriz = document.getElementById('totalRegistrosMatriz');
        const totalVariedadesMatriz = document.getElementById('totalVariedadesMatriz');
        const totalTallosMatriz = document.getElementById('totalTallosMatriz');
        const btnExportExcel = document.getElementById('btnExportExcel');

        const toastContainer = document.getElementById('toastContainer');

        function mostrarToast(mensaje, tipo = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            let icono = tipo === 'success' ? '<i class="fas fa-check-circle"></i>' : (tipo === 'error' ? '<i class="fas fa-exclamation-circle"></i>' : '<i class="fas fa-info-circle"></i>');
            toast.innerHTML = `${icono}<span class="toast-message">${mensaje}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-hide');
                setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
            }, 3000);
        }

        const hoy = new Date();
        const año = hoy.getFullYear(), mes = (hoy.getMonth()+1).toString().padStart(2,'0'), dia = hoy.getDate().toString().padStart(2,'0');
        fechaInput.value = `${año}-${mes}-${dia}`;

        const tabRegistroBtn = document.getElementById('tabRegistroBtn');
        const tabHistorialBtn = document.getElementById('tabHistorialBtn');
        const tabMatrizBtn = document.getElementById('tabMatrizBtn');
        const tabRegistro = document.getElementById('tabRegistro');
        const tabHistorial = document.getElementById('tabHistorial');
        const tabMatriz = document.getElementById('tabMatriz');

        const hace7Dias = new Date(hoy); hace7Dias.setDate(hoy.getDate()-10);
        fechaDesdeMatriz.value = `${hace7Dias.getFullYear()}-${(hace7Dias.getMonth()+1).toString().padStart(2,'0')}-${hace7Dias.getDate().toString().padStart(2,'0')}`;
        fechaHastaMatriz.value = `${año}-${mes}-${dia}`;

        const historialBody = document.getElementById('historialBody');
        const calcDisplay = document.getElementById('calcDisplay');
        let currentValue = '0';
        let inventario = [];
        let codigoCounter = 1;
        let historial = [];

        const calidadAbrMap = { 'Exportacion':'E', 'Clase b':'B', 'nacional':'N', 'otro':'O' };
        function getAbreviaturaCalidad(calidad) { return calidadAbrMap[calidad] || calidad.substring(0,1).toUpperCase(); }

        function generarCodigoRamo() {
            const ahora = new Date();
            const año = ahora.getFullYear().toString().slice(-2);
            const mes = (ahora.getMonth()+1).toString().padStart(2,'0');
            const dia = ahora.getDate().toString().padStart(2,'0');
            const fecha = `${año}${mes}${dia}`;
            const secuencia = codigoCounter;
            const secuenciaStr = secuencia.toString().padStart(8,'0');
            codigoCounter++;
            return fecha + secuenciaStr;
        }
        function generarCodigoTemporal() {
            const ahora = new Date();
            const año = ahora.getFullYear().toString().slice(-2);
            const mes = (ahora.getMonth()+1).toString().padStart(2,'0');
            const dia = ahora.getDate().toString().padStart(2,'0');
            const fecha = `${año}${mes}${dia}`;
            const random = Math.floor(Math.random()*100000000).toString().padStart(8,'0');
            return fecha + random;
        }

        async function cargarRamosDesdeAPI() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.success) {
                    inventario = result.data;
                    if (inventario.length > 0) {
                        const maxSec = inventario.reduce((max,item) => Math.max(max, parseInt(item.codigo.slice(-8)) || 0),0);
                        codigoCounter = maxSec + 1;
                    } else codigoCounter = 1;
                    historial = inventario.slice(0,20).map(r => ({ fecha: r.fecha, variedad: r.variedad, longitud: r.longitud, tallos: r.tallos, empaque: r.empaque, calidad: r.calidadAbr, ptoCorte: r.ptoCorte, codigo: r.codigo, id: r.id }));
                    actualizarHistorial();
                    actualizarEstadisticasMatriz();
                    if (tabMatriz.classList.contains('active')) renderizarMatriz();
                } else mostrarToast('Error al cargar datos del servidor', 'error');
            } catch (error) { mostrarToast('Error de conexión con el servidor', 'error'); }
        }

        async function agregarRegistros(cantidad, imprimir = false, tipo = '') {
            const datosBase = obtenerDatosFormulario();
            const calidadAbr = getAbreviaturaCalidad(datosBase.calidad);
            const nuevosRegistros = [];
            for (let i=0; i<cantidad; i++) {
                const codigo = generarCodigoRamo();
                nuevosRegistros.push({ codigo, fecha: datosBase.fecha, proveedor: datosBase.proveedor, calidad: datosBase.calidad, calidadAbr, variedad: datosBase.variedad, empaque: datosBase.empaque, ptoCorte: datosBase.ptoCorte, longitud: parseInt(datosBase.longitud), tallos: parseInt(datosBase.tallos) });
            }
            try {
                const response = await fetch(`${API_URL}/batch`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(nuevosRegistros) });
                const result = await response.json();
                if (result.success) {
                    await cargarRamosDesdeAPI();
                    const ahora = new Date();
                    ultimoRegistroSpan.innerText = `${ahora.getHours().toString().padStart(2,'0')}:${ahora.getMinutes().toString().padStart(2,'0')}`;
                    mostrarToast(`${cantidad} etiqueta(s) registrada(s) correctamente`, 'success');
                    if (imprimir) { generarPDFeImprimir(nuevosRegistros, tipo); mostrarToast(`Enviando ${cantidad} etiqueta(s) a impresión...`, 'info'); }
                } else mostrarToast('Error al guardar: '+result.error, 'error');
            } catch (error) { mostrarToast('Error de conexión con el servidor', 'error'); }
        }

        async function eliminarRegistro(codigo, id) {
            if (confirm('¿Eliminar este registro?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method:'DELETE' });
                    const result = await response.json();
                    if (result.success) { await cargarRamosDesdeAPI(); mostrarToast(`Registro ${codigo} eliminado`, 'success'); }
                    else mostrarToast('Error al eliminar: '+result.error, 'error');
                } catch (error) { mostrarToast('Error de conexión con el servidor', 'error'); }
            }
        }

        function updateDisplay() { calcDisplay.innerText = currentValue === '' ? '0' : currentValue; }
        document.querySelectorAll('.key-btn[data-num]').forEach(btn => btn.addEventListener('click', e => { e.preventDefault(); const num = btn.getAttribute('data-num'); if (currentValue === '0' || currentValue === '') currentValue = num; else currentValue += num; if (currentValue.length > 5) currentValue = currentValue.slice(0,5); updateDisplay(); }));
        backspaceButton.addEventListener('click', e => { e.preventDefault(); if (currentValue.length > 1) currentValue = currentValue.slice(0,-1); else currentValue = '0'; updateDisplay(); });
        document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', e => { e.preventDefault(); const preset = btn.getAttribute('data-preset'); if (preset) { currentValue = preset; updateDisplay(); } }));

        function obtenerDatosFormulario() {
            return { fecha: fechaInput.value, proveedor: proveedorSelect.value, calidad: calidadSelect.value, variedad: variedadSelect.value, empaque: empaqueSelect.value, ptoCorte: ptoCorteSelect.value, longitud: longitudSelect.value, tallos: tallosSelect.value };
        }

        function generarPDFeImprimir(registros, tipo) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [57, 25] });

    registros.forEach((registro, idx) => {
        if (idx > 0) doc.addPage([57, 25]);

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(5);
        doc.text('ZC ROSES', 2, 3);
        if (tipo && tipo !== '') {
            doc.setFont('helvetica', 'normal');
            doc.text(tipo, 52, 3, { align: 'right' });  // Ancho 57, margen derecho aprox 5
            doc.setFont('helvetica', 'bold');
        }

        // Variedad con ajuste de tamaño
        let variedad = registro.variedad || '';
        let fontSizeVar = 10;
        let maxAncho = 52;
        doc.setFontSize(fontSizeVar);
        let anchoVar = doc.getTextWidth(variedad);
        while (anchoVar > maxAncho && fontSizeVar > 6) {
            fontSizeVar--;
            doc.setFontSize(fontSizeVar);
            anchoVar = doc.getTextWidth(variedad);
        }
        doc.text(variedad, 28.5, 8, { align: 'center' });  // Centrado

        // Longitud / Tallos
        doc.setFontSize(8);
        doc.text(`${registro.longitud}/${registro.tallos}`, 3, 14);

        // Calidad + Punto de corte
        doc.setFontSize(5);
        let calidadInfo = registro.calidadAbr || 'E';
        let corteInfo = registro.ptoCorte || 'RS';
        doc.text(`${calidadInfo} | ${corteInfo}`, 3, 18);

        // Código de barras (más pequeño en altura)
        const canvas = document.createElement('canvas');
        JsBarcode(canvas, registro.codigo, {
            format: "CODE128",
            width: 2.2,
            height: 30,
            displayValue: false,
            margin: 0
        });
        const imgData = canvas.toDataURL('image/png');
        doc.addImage(imgData, 'PNG', 4, 21, 49, 5);

        // Texto del código centrado
        doc.setFontSize(4);
        doc.setFont('helvetica', 'normal');
        const codigoTexto = registro.codigo;
        const anchoCodigo = doc.getTextWidth(codigoTexto);
        doc.text(codigoTexto, (57 - anchoCodigo) / 2, 23.5);
    });
            const pdfBlob = doc.output('blob'), pdfUrl = URL.createObjectURL(pdfBlob);
            const iframe = document.createElement('iframe');
            iframe.style.position = 'absolute'; iframe.style.top = '-9999px'; iframe.style.left = '-9999px'; iframe.style.width = '0'; iframe.style.height = '0'; iframe.style.border = 'none';
            document.body.appendChild(iframe);
            iframe.onload = function() { try { this.contentWindow.focus(); this.contentWindow.print(); } catch(e){ mostrarToast('Error al iniciar la impresión','error'); } finally { setTimeout(()=>{ document.body.removeChild(iframe); URL.revokeObjectURL(pdfUrl); },1000); } };
            iframe.src = pdfUrl;
        }

        function obtenerRegistrosFiltrados() {
            const desde = fechaDesdeMatriz.value, hasta = fechaHastaMatriz.value, calidadFiltro = filterCalidadMatriz.value, busqueda = searchInputMatriz.value.toLowerCase();
            return inventario.filter(i => {
                const fechaItem = limpiarFecha(i.fecha);
                if (desde && fechaItem < desde) return false;
                if (hasta && fechaItem > hasta) return false;
                if (calidadFiltro && i.calidadAbr !== calidadFiltro) return false;
                if (busqueda && !i.variedad.toLowerCase().includes(busqueda)) return false;
                return true;
            });
        }

        function actualizarEstadisticasMatriz() {
            totalRegistrosMatriz.innerText = inventario.length;
            totalVariedadesMatriz.innerText = new Set(inventario.map(i=>i.variedad)).size;
            totalTallosMatriz.innerText = inventario.reduce((acc,i)=>acc+i.tallos,0);
        }

        function limpiarFecha(fechaStr) { return fechaStr ? fechaStr.split('T')[0] : ''; }

        function renderizarMatriz() {
            const filtrados = obtenerRegistrosFiltrados();
            const fechas = [...new Set(filtrados.map(i=>limpiarFecha(i.fecha)))].sort();
            const grupos = {};
            filtrados.forEach(i => {
                const fechaLimpia = limpiarFecha(i.fecha);
                const key = `${i.variedad}|${i.longitud}|${i.tallos}|${i.empaque}|${i.calidadAbr}|${i.ptoCorte}`;
                if (!grupos[key]) grupos[key] = { ...i, fechas: {} };
                if (!grupos[key].fechas[fechaLimpia]) grupos[key].fechas[fechaLimpia] = 0;
                grupos[key].fechas[fechaLimpia]++;
            });
            const gruposArray = Object.values(grupos);
            gruposArray.sort((a,b)=>a.variedad.localeCompare(b.variedad) || parseInt(a.longitud)-parseInt(b.longitud));

            let thead = '<tr><th>Variedades</th><th>Emp</th><th>Cal</th><th>Pto</th>';
            fechas.forEach(f => { const partes = f.split('-'); thead += `<th>${partes.length===3 ? partes[1]+'/'+partes[2] : f}</th>`; });
            thead += '<th>Total</th>;</thead>';
            matrizThead.innerHTML = thead;
            if (!gruposArray.length) { matrizTbody.innerHTML = '<tr class="empty-row"><td colspan="'+(4+fechas.length+1)+'">Sin datos</td></tr>'; return; }

            let tbody = '', totales = {}, totalGlobal = 0;
            fechas.forEach(f=>totales[f]=0);
            gruposArray.forEach(g => {
                let row = `<tr><td>${g.variedad} ${g.longitud} ${g.tallos} ${g.calidadAbr}</td><td>${g.empaque}</td><td>${g.calidadAbr}</td><td>${g.ptoCorte}</td>`;
                let suma = 0;
                fechas.forEach(f => { const cnt = g.fechas[f] || 0; row += `<td>${cnt||''}</td>`; suma += cnt; totales[f] += cnt; });
                row += `<td>${suma}</td></tr>`;
                tbody += row;
                totalGlobal += suma;
            });
            let totalRow = '<tr class="total-row"><td colspan="4">Totales:</td>';
            fechas.forEach(f => totalRow += `<td><strong>${totales[f]}</strong></td>`);
            totalRow += `<td><strong>${totalGlobal}</strong></td></tr>`;
            matrizTbody.innerHTML = tbody + totalRow;
        }

        // Exportar a XLSX con columnas separadas
        function exportarExcel() {
            const registrosFiltrados = obtenerRegistrosFiltrados();
            if (!registrosFiltrados.length) {
                mostrarToast('No hay datos para exportar', 'info');
                return;
            }
            // Preparar datos para SheetJS: cada registro es un objeto con las columnas
            const data = registrosFiltrados.map(reg => ({
                Fecha: limpiarFecha(reg.fecha),
                Variedad: reg.variedad,
                Longitud: reg.longitud,
                Tallos: reg.tallos,
                Empaque: reg.empaque,
                Calidad: reg.calidadAbr,
                "Pto Corte": reg.ptoCorte,
                Código: reg.codigo
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, `inventario_rosas_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
            mostrarToast('Exportación completada', 'success');
        }

        btnExportExcel.addEventListener('click', exportarExcel);

        function actualizarHistorial() {
            if (!historial.length) { historialBody.innerHTML = '<tr class="empty-row"><td colspan="9">No hay registros aún.</td></tr>'; return; }
            let html = '';
            historial.forEach(item => {
                const fechaLimpia = limpiarFecha(item.fecha);
                const partes = fechaLimpia.split('-');
                const fechaFormateada = partes.length===3 ? `${partes[1]}/${partes[2]}/${partes[0]}` : fechaLimpia;
                html += `<tr><td>${fechaFormateada}</td><td>${item.variedad}</td><td>${item.longitud}</td><td>${item.tallos}</td><td>${item.empaque}</td><td>${item.calidad}</td><td>${item.ptoCorte}</td><td>${item.codigo}</td><td><i class="fas fa-trash-alt delete-btn" onclick="eliminarRegistro('${item.codigo}', ${item.id})"></i></td></tr>`;
            });
            historialBody.innerHTML = html;
        }

        function resetearContador() { currentValue = '0'; updateDisplay(); }
        function registrarEtiquetas() { let cant = parseInt(currentValue,10); if (!cant || isNaN(cant)) { mostrarToast('La cantidad no puede ser 0','error'); return; } agregarRegistros(cant,false,''); resetearContador(); }
        function imprimirEtiquetas() { let cant = parseInt(currentValue,10); if (!cant || isNaN(cant)) { mostrarToast('La cantidad no puede ser 0','error'); return; } const datosBase = obtenerDatosFormulario(); const calidadAbr = getAbreviaturaCalidad(datosBase.calidad); const registrosParaImprimir = []; for (let i=0;i<cant;i++) { const codigo = generarCodigoTemporal(); registrosParaImprimir.push({ codigo, fecha:datosBase.fecha, proveedor:datosBase.proveedor, calidad:datosBase.calidad, calidadAbr, variedad:datosBase.variedad, empaque:datosBase.empaque, ptoCorte:datosBase.ptoCorte, longitud:parseInt(datosBase.longitud), tallos:parseInt(datosBase.tallos) }); } generarPDFeImprimir(registrosParaImprimir,'IMP'); mostrarToast(`Enviando ${cant} etiqueta(s) a impresión (solo vista previa)`,'info'); resetearContador(); }

        btnRegistrar.addEventListener('click', e=>{ e.preventDefault(); registrarEtiquetas(); });
        btnImprimir.addEventListener('click', e=>{ e.preventDefault(); imprimirEtiquetas(); });
        irButton.addEventListener('click', e=>{ e.preventDefault(); let cant = parseInt(currentValue,10); if (!cant || isNaN(cant)) { mostrarToast('La cantidad no puede ser 0','error'); return; } agregarRegistros(cant,true,'IR'); resetearContador(); });
        fechaDesdeMatriz.addEventListener('change', renderizarMatriz);
        fechaHastaMatriz.addEventListener('change', renderizarMatriz);
        filterCalidadMatriz.addEventListener('change', renderizarMatriz);
        searchInputMatriz.addEventListener('input', renderizarMatriz);
        tabRegistroBtn.addEventListener('click',()=>{ tabRegistroBtn.classList.add('active'); tabHistorialBtn.classList.remove('active'); tabMatrizBtn.classList.remove('active'); tabRegistro.classList.add('active'); tabHistorial.classList.remove('active'); tabMatriz.classList.remove('active'); });
        tabHistorialBtn.addEventListener('click',()=>{ tabHistorialBtn.classList.add('active'); tabRegistroBtn.classList.remove('active'); tabMatrizBtn.classList.remove('active'); tabHistorial.classList.add('active'); tabRegistro.classList.remove('active'); tabMatriz.classList.remove('active'); actualizarHistorial(); });
        tabMatrizBtn.addEventListener('click',()=>{ tabMatrizBtn.classList.add('active'); tabRegistroBtn.classList.remove('active'); tabHistorialBtn.classList.remove('active'); tabMatriz.classList.add('active'); tabRegistro.classList.remove('active'); tabHistorial.classList.remove('active'); renderizarMatriz(); actualizarEstadisticasMatriz(); });
        function actualizarLote() { loteSpan.innerText = `${ptoCorteSelect.value}-${longitudSelect.value}-${variedadSelect.value.substring(0,2).toUpperCase()}`; }
        ptoCorteSelect.addEventListener('change', actualizarLote); longitudSelect.addEventListener('change', actualizarLote); variedadSelect.addEventListener('change', actualizarLote);
        actualizarLote();

        cargarRamosDesdeAPI();
        updateDisplay();
        window.eliminarRegistro = eliminarRegistro;
    })();
</script>
